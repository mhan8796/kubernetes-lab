<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello Kubernetes</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #16202f;
      background: linear-gradient(135deg, #f8fbff, #eef7f8, #fff8ec);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(90vw, 42rem);
      padding: 2rem;
      border: 1px solid rgba(22, 32, 47, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 20px 60px rgba(31, 52, 86, 0.14);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 9vw, 5rem);
      line-height: 0.95;
    }

    p {
      color: #657386;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    code {
      color: #326ce5;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello Kubernetes.</h1>
    <p>This response came from pod <code>{{POD_NAME}}</code> through the <code>hello-service</code> Service.</p>
  </main>
</body>
</html>
