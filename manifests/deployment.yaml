apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-printer
  namespace: hello-world
  labels:
    app.kubernetes.io/name: hello-printer
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-printer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-printer
    spec:
      containers:
        - name: hello-printer
          image: hello-kubernetes:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
